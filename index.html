  /* ── Keyframes ── */
  @keyframes fadeUp   {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeDown {from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

  @keyframes colPulse {0%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}100%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}

  .card-hover{transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}

  /* button press */
  .btn-press{transition:transform .12s ease,filter .12s ease}

  /* amber pulse on live timer when urgent */

  /* glowing dot for unread */
  .dot-glow{animation:pulse-red 1.5s ease infinite}

  /* logo lightning float */
  .logo-float{animation:float 3s ease-in-out infinite}

  /* tab indicator slide in */
  .tab-active-bar{transform-origin:left;animation:tabSlide .22s ease-out both}

  /* overlay backdrop */
  .overlay-bg{animation:scaleIn .18s ease-out both}

  /* input focus ring */
  input:focus,textarea:focus,select:focus{
    box-shadow:0 0 0 3px rgba(245,158,11,.25);
  }

  /* kanban col entrance */
  .kanban-col{animation:fadeUp .35s cubic-bezier(.22,.68,0,1.1) both}

  /* ── Auth page ── */
  @keyframes lpReveal  {from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes lpScroll  {0%{transform:translateY(0)}100%{transform:translateY(-52%)}}

  @keyframes scanline  {0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
  @keyframes mockPulse {0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 40px 4px rgba(245,158,11,.15)}}
  @keyframes typeLine  {from{width:0}to{width:100%}}
  @keyframes badgePop  {0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}

  nextOrderId:3,nextTicketId:2,nextUserId:3,currentUser:null,isAdmin:false

function reducer(s,a){
  switch(a.type){
    case"LOGIN_ADMIN":return{...s,currentUser:{id:0,name:"Admin",email:"admin@pageflash.com",role:"admin"},isAdmin:true};
    case"LOGIN_CLIENT":return{...s,currentUser:a.user,isAdmin:a.user.role==="admin"};
    case"LOGOUT":return{...s,currentUser:null,isAdmin:false};
    case"REGISTER":{const u={id:s.nextUserId,...a.user,role:"client",createdAt:new Date().toISOString()};return{...s,users:[...s.users,u],currentUser:u,isAdmin:false,nextUserId:s.nextUserId+1};}
    case"CREATE_ORDER":{const num="PF-"+String(s.nextOrderId).padStart(4,"0");const o={id:s.nextOrderId,number:num,clientId:s.currentUser.id,clientName:s.currentUser.name,...a.order,status:a.order.needsQuote?"Orçamento":"Novo",createdAt:new Date().toISOString(),deliveryLink:"",htmlCode:"",internalNote:"",quote:"",quoteStatus:"",assigneeId:null};return{...s,orders:[...s.orders,o],nextOrderId:s.nextOrderId+1};}
    case"UPDATE_ORDER":return{...s,orders:s.orders.map(o=>o.id===a.id?{...o,...a.updates}:o)};
    case"RESPOND_QUOTE":return{...s,orders:s.orders.map(o=>o.id===a.id?{...o,quoteStatus:a.response}:o)};
    case"CREATE_TICKET":{const num="TK-"+String(s.nextTicketId).padStart(4,"0");const t={id:s.nextTicketId,number:num,clientId:s.currentUser.id,clientName:s.currentUser.name,...a.ticket,status:"Aberto",response:"",createdAt:new Date().toISOString()};return{...s,tickets:[...s.tickets,t],nextTicketId:s.nextTicketId+1};}
    case"RESPOND_TICKET":return{...s,tickets:s.tickets.map(t=>t.id===a.id?{...t,response:a.response,status:"Respondido"}:t)};
    case"TOGGLE_ADMIN":return{...s,users:s.users.map(u=>u.id===a.id?{...u,role:u.role==="admin"?"client":"admin"}:u)};
    case"ADMIN_CREATE_USER":{const u={id:s.nextUserId,...a.user,createdAt:new Date().toISOString()};return{...s,users:[...s.users,u],nextUserId:s.nextUserId+1};}
    case"LOAD_DATA":{
      const maxO=a.orders.length?Math.max(...a.orders.map(o=>o.id))+1:s.nextOrderId;
      const maxT=a.tickets.length?Math.max(...a.tickets.map(t=>t.id))+1:s.nextTicketId;
      const maxU=a.users.length?Math.max(...a.users.map(u=>u.id))+1:s.nextUserId;
      return{...s,users:a.users,orders:a.orders.map(o=>({...o,files:o.files||[]})),tickets:a.tickets,nextOrderId:maxO,nextTicketId:maxT,nextUserId:maxU};
    }
    default:return s;
  }
}

const maskPhone=v=>{const d=v.replace(/\D/g,"").slice(0,11);if(!d.length)return"";if(d.length<=2)return"("+d;if(d.length<=6)return"("+d.slice(0,2)+") "+d.slice(2);if(d.length<=10)return"("+d.slice(0,2)+") "+d.slice(2,6)+"-"+d.slice(6);return"("+d.slice(0,2)+") "+d.slice(2,7)+"-"+d.slice(7);};

function Badge({status}){

function CopyBtn({text,sm}){
  const[ok,setOk]=useState(false);
  const copy=()=>{
    const fn=()=>{setOk(true);setTimeout(()=>setOk(false),2000);};
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(fn).catch(fn);}
    else{const el=document.createElement("textarea");el.value=text;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);fn();}
  };
  const sz=sm?"w-3.5 h-3.5":"w-4 h-4";
  return(
    <button onClick={e=>{e.stopPropagation();copy();}} title={ok?"Copiado!":"Copiar"} className={"cursor-pointer transition-colors duration-200 "+(ok?"text-green-400":"text-gray-400 hover:text-gray-700")}>
      {ok
        ?<svg className={sz} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>
        :<svg className={sz} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      }
    </button>
  );
}

function Timer({createdAt}){
  const[rem,setRem]=useState(0);
  useEffect(()=>{
    const calc=()=>Math.max(0,new Date(createdAt).getTime()+864e5-Date.now());
    setRem(calc());
    const iv=setInterval(()=>setRem(calc()),1000);
    return()=>clearInterval(iv);
  },[createdAt]);
  if(rem===0)return<span className="text-red-400 font-semibold text-xs timer-urgent inline-block px-1.5 py-0.5 rounded-md bg-red-500/10">Prazo encerrado</span>;
  const h=Math.floor(rem/36e5),m=Math.floor(rem%36e5/6e4),sec=Math.floor(rem%6e4/1e3);
  const p=n=>String(n).padStart(2,"0");
  const urgent=rem<108e5;
  return<span className={"font-mono text-xs font-semibold inline-block px-1.5 py-0.5 rounded-md "+(urgent?"text-red-400 bg-red-500/10 timer-urgent":"text-amber-400 bg-amber-500/10")}>{p(h)}:{p(m)}:{p(sec)}</span>;
}

    e.preventDefault();setErr("");
    const u=state.users.find(u=>u.email===f.email&&u.password===f.password);
    if(u){dispatch({type:"LOGIN_CLIENT",user:u});return;}
    if(f.email==="admin@pageflash.com"&&f.password==="admin123"){dispatch({type:"LOGIN_ADMIN"});return;}
    setErr("Email ou senha inválidos.");

function NewOrderTab({state,dispatch,onSuccess}){
  const[f,setF]=useState({name:state.currentUser.name,companyName:"",email:state.currentUser.email,whatsapp:"",niche:"",objective:"",copy:"",visualStyle:""});
  const[files,setFiles]=useState([]);
  const[needsQuote,setNeedsQuote]=useState(false);
  const[ok,setOk]=useState(null);
  const inp="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-amber-500 transition-colors text-sm";
  const lbl="block text-sm font-medium text-gray-600 mb-1.5";

  const addFiles=e=>{
    Array.from(e.target.files).forEach(file=>{
      if(file.type.startsWith("image/")){
        const r=new FileReader();
        r.onload=ev=>setFiles(p=>[...p,{name:file.name,size:file.size,preview:ev.target.result}]);
        r.readAsDataURL(file);
      }else{setFiles(p=>[...p,{name:file.name,size:file.size,preview:null}]);}
    });
  };

  const submit=e=>{
    e.preventDefault();
    const num="PF-"+String(state.nextOrderId).padStart(4,"0");
    dispatch({type:"CREATE_ORDER",order:{...f,files,needsQuote}});
    setOk({num,needsQuote});
    setF({name:state.currentUser.name,companyName:"",email:state.currentUser.email,whatsapp:"",niche:"",objective:"",copy:"",visualStyle:""});
    setFiles([]);setNeedsQuote(false);
    setTimeout(()=>{setOk(null);onSuccess();},3500);
  };

  return(
    <div className="max-w-2xl">
      {ok&&(
        <div className={"mb-6 border rounded-2xl p-5 flex items-start gap-4 toast-in "+(ok.needsQuote?"bg-purple-500/10 border-purple-500/30":"bg-green-500/10 border-green-500/30")} style={{boxShadow:ok.needsQuote?"0 4px 24px rgba(168,85,247,.12)":"0 4px 24px rgba(34,197,94,.12)"}}>

          </div>
          <div>

            <div className="flex items-center gap-2 mt-1"><span className="text-gray-900 text-sm">Número: <strong>{ok.num}</strong></span><CopyBtn text={ok.num}/></div>
            <p className="text-gray-500 text-sm mt-1">{ok.needsQuote?"Nossa equipe vai analisar e te enviar o orçamento em breve.":"Redirecionando para seus pedidos..."}</p>

        </div>

      <form onSubmit={submit} className="space-y-5">
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">

          <div><label className={lbl}>Nome da empresa</label><input required value={f.companyName} onChange={e=>setF({...f,companyName:e.target.value})} className={inp} placeholder="Empresa Ltda."/></div>
          <div><label className={lbl}>Email de contato</label><input required type="email" value={f.email} onChange={e=>setF({...f,email:e.target.value})} className={inp} placeholder="email@empresa.com"/></div>
          <div><label className={lbl}>WhatsApp</label><input required value={f.whatsapp} onChange={e=>setF({...f,whatsapp:maskPhone(e.target.value)})} className={inp} placeholder="(11) 99999-0000"/></div>
        </div>
        <div><label className={lbl}>Nicho do negócio</label><input required value={f.niche} onChange={e=>setF({...f,niche:e.target.value})} className={inp} placeholder="Ex: Marketing Digital, Saúde, Imóveis..."/></div>
        <div><label className={lbl}>Objetivo da página</label><input required value={f.objective} onChange={e=>setF({...f,objective:e.target.value})} className={inp} placeholder="Ex: Captar leads, vender produto..."/></div>
        <div><label className={lbl}>Copy da LP</label><textarea required value={f.copy} onChange={e=>setF({...f,copy:e.target.value})} rows={5} className={inp+" resize-none"} placeholder="Cole os textos que devem aparecer na página: headline, benefícios, CTA..."/></div>
        <div><label className={lbl}>Estilo visual e referências</label><textarea required value={f.visualStyle} onChange={e=>setF({...f,visualStyle:e.target.value})} rows={3} className={inp+" resize-none"} placeholder="Cores, mood, sites de referência..."/></div>
        <div>
          <label className={lbl}>ID visual e assets</label>
          <label className="cursor-pointer flex flex-col items-center justify-center w-full border-2 border-dashed border-gray-300 hover:border-amber-500/50 rounded-xl p-6 transition-colors">
            <svg className="w-8 h-8 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
            <p className="text-gray-500 text-sm">Clique para selecionar arquivos</p>
            <p className="text-gray-400 text-xs mt-1">Imagens, logos, vídeos</p>
            <input type="file" multiple accept="image/*,video/*" onChange={addFiles} className="hidden"/>

          {files.length>0&&(
            <div className="mt-3 grid grid-cols-2 sm:grid-cols-3 gap-3">
              {files.map((f2,i)=>(
                <div key={i} className="bg-gray-50 border border-gray-200 rounded-xl p-2.5 flex gap-2 items-center">
                  {f2.preview
                    ?<img src={f2.preview} alt={f2.name} className="w-10 h-10 rounded-lg object-cover flex-shrink-0"/>
                    :<div className="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center flex-shrink-0"><svg className="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5"/></svg></div>
                  }
                  <div className="min-w-0 flex-1"><p className="text-xs text-gray-900 truncate">{f2.name}</p><p className="text-xs text-gray-400">{fmtSize(f2.size)}</p></div>
                  <button type="button" onClick={()=>setFiles(files.filter((_,fi)=>fi!==i))} className="cursor-pointer text-gray-400 hover:text-red-400 transition-colors flex-shrink-0">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Complexity toggle */}
        <button type="button" onClick={()=>setNeedsQuote(v=>!v)} className={"cursor-pointer w-full flex items-center gap-3 rounded-2xl p-4 border-2 transition-all duration-200 text-left "+(needsQuote?"border-purple-400 bg-purple-50 shadow-purple-100 shadow-md":"border-gray-200 bg-gray-50 hover:border-gray-300")}>
          <div className={"relative flex-shrink-0 w-11 h-6 rounded-full transition-colors duration-300 "+(needsQuote?"bg-purple-500":"bg-gray-300")}>
            <div className={"absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-300 "+(needsQuote?"translate-x-5":"translate-x-0.5")}/>
          </div>
          <div className="min-w-0">
            <p className={"text-sm font-semibold transition-colors "+(needsQuote?"text-purple-600":"text-gray-700")}>Projeto complexo — preciso de orçamento</p>
            <p className="text-xs text-gray-400 mt-0.5">Múltiplas seções, integrações, design personalizado ou funcionalidades avançadas</p>
          </div>
          {needsQuote&&<span className="ml-auto flex-shrink-0 text-xs font-bold text-purple-500 bg-purple-100 px-2 py-0.5 rounded-full">Orçamento</span>}
        </button>
        <button type="submit" className={"cursor-pointer btn-press w-full font-bold py-3.5 rounded-xl transition-colors text-sm "+(needsQuote?"bg-purple-500 hover:bg-purple-400 text-white":"bg-amber-500 hover:bg-amber-400 text-black")} style={{boxShadow:needsQuote?"0 4px 24px rgba(168,85,247,.4)":"0 4px 24px rgba(245,158,11,.4)"}}>
          {needsQuote?"Solicitar orçamento":"Enviar pedido"}
        </button>
      </form>
    </div>
  );
}

            <div><p className="text-xs text-gray-400 mb-1">Estilo visual</p><p className="text-sm text-gray-700 bg-gray-50 rounded-xl px-3 py-2">{order.visualStyle}</p></div>
            <div className="flex items-center gap-2 text-xs text-gray-400"><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Prazo: <Timer createdAt={order.createdAt}/></div>

              </select>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-600 mb-1.5">Responsável</label>
              <select value={f.assigneeId??""} onChange={e=>setF({...f,assigneeId:e.target.value||null})} className={"cursor-pointer "+inp}>

                <input value={f.quote} onChange={e=>setF({...f,quote:maskMoney(e.target.value)})} className={inp+" border-purple-200 focus:border-purple-400"} placeholder="R$ 0,00"/>
                <p className="text-xs text-purple-400">Ao salvar, o valor aparece no painel do cliente ao lado do timer.</p>
                {order.quoteStatus==="accepted"&&<p className="text-xs font-semibold text-green-500 flex items-center gap-1"><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>Cliente aceitou o orçamento</p>}
                {order.quoteStatus==="rejected"&&<p className="text-xs font-semibold text-red-400 flex items-center gap-1"><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>Cliente recusou o orçamento</p>}
              </div>
            )}
            <div><label className="block text-sm font-medium text-gray-600 mb-1.5">Link de entrega</label><input value={f.deliveryLink} onChange={e=>setF({...f,deliveryLink:e.target.value})} className={inp} placeholder="https://..."/></div>
            <div><label className="block text-sm font-medium text-gray-600 mb-1.5">Código HTML da LP</label><textarea value={f.htmlCode} onChange={e=>setF({...f,htmlCode:e.target.value})} rows={6} className={inp+" font-mono resize-none"} placeholder={"<!DOCTYPE html>..."}/></div>
            <div><label className="block text-sm font-medium text-gray-600 mb-1.5">Nota interna</label><textarea value={f.internalNote} onChange={e=>setF({...f,internalNote:e.target.value})} rows={3} className={inp+" resize-none"} placeholder="Notas internas (não visível ao cliente)..."/></div>
            <button onClick={save} className={"cursor-pointer btn-press w-full font-bold py-3 rounded-xl transition-all text-sm "+(saved?"bg-green-500 text-gray-900":"bg-amber-500 hover:bg-amber-400 text-black")} style={saved?{boxShadow:"0 4px 20px rgba(34,197,94,.35)"}:{boxShadow:"0 4px 20px rgba(245,158,11,.35)"}}>
              {saved?"✓ Alterações salvas!":"Salvar alterações"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Avatar({user,sm}){
  if(!user)return(
    <div className={"rounded-full border border-dashed border-zinc-600 flex items-center justify-center flex-shrink-0 "+(sm?"w-5 h-5":"w-6 h-6")}>
      <svg className={"text-gray-400 "+(sm?"w-3 h-3":"w-3.5 h-3.5")} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    </div>
  );
  const initials=user.name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
  const colors=["bg-amber-500","bg-blue-500","bg-purple-500","bg-green-500","bg-pink-500","bg-teal-500"];
  const color=colors[user.id%colors.length];
  return(
    <div title={user.name} className={"rounded-full flex items-center justify-center flex-shrink-0 font-bold text-black "+(sm?"w-5 h-5 text-[9px]":"w-6 h-6 text-[10px]")+" "+color} style={{boxShadow:"0 0 0 2px #fff"}}>
      {initials}
    </div>
  );
}

function PipelineTab({state,dispatch}){
  const[sel,setSel]=useState(null);
  const[dragId,setDragId]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const didDrag=useRef(false);
  const[justDropped,setJustDropped]=useState(null);
  const[assigningId,setAssigningId]=useState(null);

  const COL_CLS={"Orçamento":"text-purple-500 bg-purple-500/15","Novo":"text-gray-500 bg-gray-100","Em produção":"text-blue-400 bg-blue-500/20","Aguardando revisão":"text-amber-400 bg-amber-500/20","Entregue":"text-green-400 bg-green-500/20"};
  const live=id=>state.orders.find(o=>o.id===id);
  const getUser=id=>state.users.find(u=>u.id===id)||null;
  const admins=state.users.filter(u=>u.role==="admin");

  const onDragStart=(e,id)=>{
    didDrag.current=true;
    setDragId(id);
    e.dataTransfer.effectAllowed="move";
    e.dataTransfer.setData("text/plain",String(id));
  };
  const onDragEnd=()=>{setDragId(null);setDragOver(null);};
  const onDragOver=(e,col)=>{e.preventDefault();e.dataTransfer.dropEffect="move";setDragOver(col);};
  const onDragLeave=e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOver(null);};
  const onDrop=(e,col)=>{
    e.preventDefault();
    const id=Number(e.dataTransfer.getData("text/plain"));
    const order=state.orders.find(o=>o.id===id);
    if(order&&order.status!==col){
      dispatch({type:"UPDATE_ORDER",id,updates:{status:col}});
      setJustDropped(id);
      setTimeout(()=>setJustDropped(null),700);
    }
    setDragId(null);setDragOver(null);
  };

  const assignQuick=(orderId,assigneeId)=>{
    dispatch({type:"UPDATE_ORDER",id:orderId,updates:{assigneeId:assigneeId?Number(assigneeId):null}});
    setAssigningId(null);
  };

  return(
    <div>
      {dragId&&(
        <div className="mb-3 flex items-center gap-2 text-xs text-amber-500 font-medium fade-up">
          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
          Arraste para outra coluna
        </div>
      )}
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
        {STATUSES.map((col,ci)=>{
          const cards=state.orders.filter(o=>o.status===col);
          const colDelay=["","s1","s2","s3","s4"][ci]||"";
          const isOver=dragOver===col;
          const dragCard=dragId?state.orders.find(o=>o.id===dragId):null;
          const canDrop=dragCard&&dragCard.status!==col;
          return(
            <div key={col}
              className={"border rounded-2xl p-4 kanban-col transition-all duration-200 "+colDelay+(isOver&&canDrop?" border-amber-400 bg-amber-50/60 shadow-lg shadow-amber-500/10":" bg-gray-50 border-gray-200")}
              onDragOver={e=>onDragOver(e,col)}
              onDragLeave={onDragLeave}
              onDrop={e=>onDrop(e,col)}
            >
              <div className="flex items-center justify-between mb-4">
                <h3 className="text-sm font-semibold text-gray-600">{col}</h3>
                <span className={"text-xs font-bold px-2 py-0.5 rounded-full "+COL_CLS[col]}>{cards.length}</span>
              </div>
              <div className={"space-y-3 min-h-[56px] rounded-xl transition-all duration-200 "+(isOver&&canDrop?"":"")}>
                {isOver&&canDrop&&(
                  <div className="border-2 border-dashed border-amber-400/70 rounded-xl h-14 flex items-center justify-center bg-amber-50/50 fade-up">
                    <span className="text-amber-500 text-xs font-semibold">↓ Soltar aqui</span>
                  </div>
                )}
                {cards.map((o,oi)=>{
                  const cardDelay=["","s1","s2","s3","s4"][oi]||"";
                  const dragging=dragId===o.id;
                  const dropped=justDropped===o.id;
                  const assigning=assigningId===o.id;
                  return(
                    <div key={o.id}
                      draggable
                      onDragStart={e=>onDragStart(e,o.id)}
                      onDragEnd={onDragEnd}
                      onClick={()=>{if(!didDrag.current)setSel(o.id);didDrag.current=false;}}
                      className={"border rounded-xl p-3.5 space-y-2.5 fade-up select-none "+cardDelay+(dropped?" drop-land":""+(dragging?" opacity-40 rotate-2 scale-[.97] border-amber-400 bg-amber-50":" bg-[#f1f5f9] border-gray-200 card-hover"))}
                      style={{
                        cursor:dragging?"grabbing":"pointer",
                        boxShadow:dragging?"0 20px 40px rgba(245,158,11,.2)":"0 2px 8px rgba(0,0,0,.05)",
                        transition:dragging?"none":"transform .2s ease,box-shadow .2s ease,border-color .15s ease,opacity .15s ease"
                      }}
                    >
                      <div className="flex items-start justify-between gap-2">
                        <div className="min-w-0">
                          <div className="flex items-center gap-1.5">
                            <svg className="w-3 h-3 text-gray-300 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M7 2a1 1 0 000 2h6a1 1 0 000-2H7zM7 8a1 1 0 000 2h6a1 1 0 000-2H7zM7 14a1 1 0 000 2h6a1 1 0 000-2H7z"/></svg>
                            <span className="text-gray-900 font-semibold text-xs">{o.number}</span>
                            <CopyBtn text={o.number} sm/>
                          </div>
                          <p className="text-gray-500 text-xs mt-0.5 truncate">{o.companyName}</p>
                          <p className="text-gray-400 text-xs truncate">{o.clientName}</p>
                          {o.quoteStatus==="accepted"&&<span className="inline-flex items-center gap-1 text-xs font-semibold text-green-600 bg-green-50 border border-green-200 px-1.5 py-0.5 rounded-full mt-1 pop-in"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>Aceito</span>}
                          {o.quoteStatus==="rejected"&&<span className="inline-flex items-center gap-1 text-xs font-semibold text-red-500 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded-full mt-1 pop-in"><svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>Recusado</span>}
                        </div>
                        <Avatar user={getUser(o.assigneeId)} sm/>
                      </div>

                      {/* Responsável inline */}
                      {assigning?(
                        <div className="scale-in" onClick={e=>e.stopPropagation()}>
                          <select autoFocus defaultValue={o.assigneeId??""} onChange={e=>assignQuick(o.id,e.target.value)} onBlur={()=>setAssigningId(null)} className="cursor-pointer w-full bg-white border border-amber-400 rounded-lg px-2 py-1.5 text-xs text-gray-900 focus:outline-none">
                            <option value="">— Sem responsável</option>
                            {admins.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
                          </select>
                        </div>
                      ):(
                        <button onClick={e=>{e.stopPropagation();setAssigningId(o.id);}} className="cursor-pointer w-full flex items-center gap-1.5 hover:bg-white/80 rounded-lg px-1 py-0.5 transition-colors group">
                          <Avatar user={getUser(o.assigneeId)}/>
                          <span className={"text-xs "+(o.assigneeId?"text-gray-500":"text-gray-400 italic")}>
                            {o.assigneeId?getUser(o.assigneeId)?.name:"Sem responsável"}
                          </span>
                          <svg className="w-3 h-3 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity ml-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        </button>
                      )}

                      <div className="flex items-center gap-1 pt-0.5 text-gray-400 text-xs">
                        <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <Timer createdAt={o.createdAt}/>
                      </div>
                    </div>
                  );
                })}
                {!cards.length&&!isOver&&<p className="text-gray-300 text-xs text-center py-6">Vazio</p>}
              </div>
            </div>
          );
        })}
      </div>
      {sel&&<OrderModal order={live(sel)} onClose={()=>setSel(null)} dispatch={dispatch} state={state}/>}
    </div>
  );
}

function AdminSupportTab({state,dispatch}){
  const[selId,setSelId]=useState(null);

  const selTicket=selId?live(selId):null;
  const unread=state.tickets.filter(t=>t.status==="Aberto").length;
  const respond=()=>{if(!resp.trim())return;dispatch({type:"RESPOND_TICKET",id:selId,response:resp});setResp("");};
  return(
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div>
        <div className="flex items-center gap-2 mb-4">
          <h3 className="text-base font-bold text-gray-900">Tickets</h3>
          {unread>0&&<span className="bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center dot-glow">{unread}</span>}
        </div>
        <div className="space-y-2">
          {state.tickets.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map((t,ti)=>(
            <button key={t.id} onClick={()=>{setSelId(t.id);setResp("");}} className={"cursor-pointer w-full text-left bg-white border rounded-xl p-4 transition-all duration-200 fade-up card-hover "+["","s1","s2","s3"][ti]+" "+(selId===t.id?"border-amber-500/50 shadow-amber-500/10 shadow-lg":"border-gray-200 hover:border-gray-300")}>
              <div className="flex items-start justify-between gap-2">
                <div>
                  <div className="flex items-center gap-2">
                    <span className="text-gray-400 text-xs font-mono">{t.number}</span>
                    {t.status==="Aberto"&&<span className="w-2 h-2 rounded-full bg-red-400 flex-shrink-0"/>}
                  </div>
                  <p className="text-gray-900 text-sm font-medium mt-0.5">{t.subject}</p>
                  <p className="text-gray-400 text-xs mt-0.5">{t.clientName} · {fmtDate(t.createdAt)}</p>
                </div>
                <span className={"text-xs px-2 py-0.5 rounded-full flex-shrink-0 "+(t.status==="Respondido"?"bg-green-500/15 text-green-400":"bg-gray-200 text-gray-500")}>{t.status}</span>
              </div>
            </button>
          ))}
          {!state.tickets.length&&<p className="text-gray-400 text-sm text-center py-8">Nenhum ticket ainda</p>}
        </div>
      </div>
      <div>
        {selTicket?(
          <div className="bg-white border border-gray-200 rounded-2xl p-5 space-y-4 scale-in" style={{boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
            <div>
              <div className="flex items-center gap-2 mb-1">
                <span className="text-gray-400 text-xs font-mono">{selTicket.number}</span>
                <span className={"text-xs px-2 py-0.5 rounded-full "+(selTicket.status==="Respondido"?"bg-green-500/15 text-green-400":"bg-gray-200 text-gray-500")}>{selTicket.status}</span>
              </div>
              <h4 className="text-gray-900 font-semibold">{selTicket.subject}</h4>
              <p className="text-gray-400 text-xs mt-0.5">{selTicket.clientName} · {fmtDate(selTicket.createdAt)}</p>
            </div>
            <div className="bg-gray-100 rounded-xl px-4 py-3"><p className="text-sm text-gray-600">{selTicket.message}</p></div>
            {selTicket.response&&<div className="bg-green-500/5 border border-green-500/20 rounded-xl px-4 py-3"><p className="text-xs text-green-400 font-semibold mb-1">Sua resposta:</p><p className="text-sm text-gray-600">{selTicket.response}</p></div>}
            {selTicket.status==="Aberto"&&(
              <div className="space-y-3">
                <textarea value={resp} onChange={e=>setResp(e.target.value)} rows={4} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-amber-500 transition-colors text-sm resize-none" placeholder="Escreva sua resposta..."/>

              </div>
            )}
          </div>
        ):(
          <div className="flex items-center justify-center h-48 text-gray-400 text-sm">Selecione um ticket para responder</div>
        )}
      </div>
    </div>
  );
}

function ClientsTab({state,dispatch}){
  const EMPTY={name:"",email:"",password:"",role:"client"};
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState(EMPTY);
  const[err,setErr]=useState("");
  const[ok,setOk]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function submit(){
    if(!form.name.trim()||!form.email.trim()||!form.password.trim()){setErr("Preencha todos os campos.");return;}
    if(state.users.find(u=>u.email===form.email)){setErr("Este e-mail já está cadastrado.");return;}
    dispatch({type:"ADMIN_CREATE_USER",user:{name:form.name.trim(),email:form.email.trim(),password:form.password,role:form.role}});
    setOk(true);setErr("");setForm(EMPTY);
    setTimeout(()=>{setOk(false);setShowForm(false);},1800);
  }

  return(
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <p className="text-gray-400 text-sm">{state.users.length} usuário{state.users.length!==1?"s":""} cadastrado{state.users.length!==1?"s":""}</p>
        <button onClick={()=>{setShowForm(v=>!v);setErr("");setOk(false);setForm(EMPTY);}} className="cursor-pointer btn-press flex items-center gap-1.5 bg-amber-500 hover:bg-amber-400 text-black font-bold text-sm px-4 py-2 rounded-xl transition-colors" style={{boxShadow:"0 4px 14px rgba(245,158,11,.35)"}}>
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>
          Cadastrar usuário
        </button>
      </div>

      {showForm&&(
        <div className="bg-white border border-amber-500/20 rounded-2xl p-5 space-y-4 scale-in" style={{boxShadow:"0 4px 24px rgba(245,158,11,.1)"}}>
          <h3 className="text-gray-900 font-semibold text-sm">Novo usuário</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div className="space-y-1">
              <label className="text-xs font-semibold text-gray-500">Nome completo</label>
              <input value={form.name} onChange={set("name")} placeholder="João da Silva" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-amber-500 text-sm transition-colors"/>
            </div>
            <div className="space-y-1">
              <label className="text-xs font-semibold text-gray-500">E-mail</label>
              <input type="email" value={form.email} onChange={set("email")} placeholder="email@exemplo.com" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-amber-500 text-sm transition-colors"/>
            </div>
            <div className="space-y-1">
              <label className="text-xs font-semibold text-gray-500">Senha</label>
              <input type="password" value={form.password} onChange={set("password")} placeholder="Senha de acesso" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-amber-500 text-sm transition-colors"/>
            </div>
            <div className="space-y-1">
              <label className="text-xs font-semibold text-gray-500">Tipo de acesso</label>
              <select value={form.role} onChange={set("role")} className="cursor-pointer w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-gray-900 focus:outline-none focus:border-amber-500 text-sm transition-colors">
                <option value="client">Cliente</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          {err&&<p className="text-red-500 text-xs font-medium fade-up">{err}</p>}
          {ok&&<p className="text-green-500 text-xs font-semibold fade-up">Usuário cadastrado com sucesso!</p>}
          <div className="flex gap-2 pt-1">
            <button onClick={submit} className="cursor-pointer btn-press bg-amber-500 hover:bg-amber-400 text-black font-bold text-sm px-5 py-2.5 rounded-xl transition-colors" style={{boxShadow:"0 4px 14px rgba(245,158,11,.3)"}}>Cadastrar</button>
            <button onClick={()=>{setShowForm(false);setErr("");setForm(EMPTY);}} className="cursor-pointer btn-press bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium text-sm px-5 py-2.5 rounded-xl transition-colors">Cancelar</button>
          </div>
        </div>
      )}

      <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead><tr className="border-b border-gray-200">
              {["Nome","Email","Acesso","Pedidos","Cadastrado em",""].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-400 px-4 py-3">{h}</th>)}
            </tr></thead>
            <tbody>
              {state.users.map((u,i)=>(
                <tr key={u.id} className={"hover:bg-gray-50 transition-colors "+(i<state.users.length-1?"border-b border-gray-200":"")}>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-3">
                      <div className={"w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 "+(u.role==="admin"?"bg-amber-500/20":"bg-gray-100")}>
                        <span className={"text-xs font-bold "+(u.role==="admin"?"text-amber-500":"text-gray-500")}>{u.name.charAt(0)}</span>
                      </div>
                      <span className="text-gray-900 text-sm font-medium">{u.name}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-gray-500 text-sm">{u.email}</td>
                  <td className="px-4 py-3">
                    <span className={"px-2 py-0.5 rounded-full text-xs font-medium "+(u.role==="admin"?"bg-amber-500/10 text-amber-500 border border-amber-500/30":"bg-gray-100 text-gray-600 border border-gray-200")}>
                      {u.role==="admin"?"Admin":"Cliente"}
                    </span>
                  </td>
                  <td className="px-4 py-3"><span className="text-gray-900 font-semibold text-sm">{state.orders.filter(o=>o.clientId===u.id).length}</span></td>
                  <td className="px-4 py-3 text-gray-400 text-xs whitespace-nowrap">{fmtDate(u.createdAt)}</td>
                  <td className="px-4 py-3">
                    {u.id!==state.currentUser.id&&(
                      <button onClick={()=>dispatch({type:"TOGGLE_ADMIN",id:u.id})} className={"cursor-pointer text-xs font-medium px-3 py-1 rounded-lg border transition-colors "+(u.role==="admin"?"border-red-400/30 text-red-400 hover:bg-red-50":"border-amber-500/30 text-amber-500 hover:bg-amber-50")}>
                        {u.role==="admin"?"Remover admin":"Tornar admin"}
                      </button>
                    )}
                    {u.id===state.currentUser.id&&<span className="text-gray-300 text-xs">Você</span>}
                  </td>
                </tr>
              ))}
              {!state.users.length&&<tr><td colSpan={6} className="text-center text-gray-400 py-8 text-sm">Nenhum usuário</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function AdminPanel({state,dispatch,onViewAsClient}){
  const[tab,setTab]=useState("pipeline");
  const unread=state.tickets.filter(t=>t.status==="Aberto").length;
  const tabs=[{id:"pipeline",label:"Pipeline"},{id:"orders",label:"Todos os pedidos"},{id:"support",label:"Suporte",badge:unread},{id:"clients",label:"Clientes"}];
  return(
    <div className="min-h-screen bg-[#f8fafc]">
      <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-gray-200">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <Logo sm/>
            <span className="text-xs font-semibold px-2 py-0.5 bg-amber-500/20 text-amber-400 border border-amber-500/30 rounded-full">Admin</span>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={onViewAsClient} className="cursor-pointer btn-press flex items-center gap-1.5 text-sm font-medium text-gray-600 hover:text-amber-600 bg-gray-100 hover:bg-amber-50 border border-gray-200 hover:border-amber-300 px-3 py-1.5 rounded-lg transition-all">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <span className="hidden sm:block">Ver como cliente</span>
            </button>
            <button onClick={()=>dispatch({type:"LOGOUT"})} className="cursor-pointer flex items-center gap-1.5 text-gray-500 hover:text-gray-900 text-sm transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              <span className="hidden sm:block">Sair</span>
            </button>
          </div>
        </div>
      </header>
      <div className="sticky top-16 z-30 bg-white/90 backdrop-blur-xl border-b border-gray-200">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-6 overflow-x-auto">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} className={"cursor-pointer py-3.5 text-sm font-medium border-b-2 transition-colors whitespace-nowrap flex items-center gap-2 "+(tab===t.id?"border-amber-500 text-gray-900":"border-transparent text-gray-400 hover:text-gray-600")}>
              {t.label}
              {t.badge>0&&<span className="bg-red-500 text-white text-xs font-bold w-4 h-4 rounded-full flex items-center justify-center">{t.badge}</span>}
            </button>
          ))}
        </div>
      </div>
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        {tab==="pipeline"&&<PipelineTab state={state} dispatch={dispatch}/>}
        {tab==="orders"&&<AllOrdersTab state={state} dispatch={dispatch}/>}
        {tab==="support"&&<AdminSupportTab state={state} dispatch={dispatch}/>}
        {tab==="clients"&&<ClientsTab state={state} dispatch={dispatch}/>}
      </main>
    </div>
  );
}

/* ─── ROOT ───────────────────────────────────────────────── */
function App(){
  const[state,dispatch]=useReducer(reducer,INIT);
  const[viewAsClient,setViewAsClient]=useState(false);
  const[loading,setLoading]=useState(true);
  const stateRef=useRef(state);
  useEffect(()=>{stateRef.current=state;},[state]);

  /* Load data from Supabase on mount */
  useEffect(()=>{
    (async()=>{
      try{
        const[{data:users,error:ue},{data:orders,error:oe},{data:tickets,error:te}]=await Promise.all([
          sb.from("users").select("*").order("id"),
          sb.from("orders").select("*").order("id"),
          sb.from("tickets").select("*").order("id")
        ]);
        if(ue||oe||te)console.warn("Supabase load errors",ue,oe,te);
        dispatch({type:"LOAD_DATA",users:users||[],orders:orders||[],tickets:tickets||[]});
      }catch(e){console.warn("Supabase unavailable, using local state",e);}
      setLoading(false);
    })();
  },[]);

  /* syncDispatch — updates local state AND persists to Supabase */
  const syncDispatch=useCallback(async(action)=>{
    const s=stateRef.current;
    dispatch(action);
    try{
      switch(action.type){
        case"REGISTER":{
          const u={id:s.nextUserId,...action.user,role:"client",createdAt:new Date().toISOString()};
          await sb.from("users").upsert(u);break;
        }
        case"ADMIN_CREATE_USER":{
          const u={id:s.nextUserId,...action.user,createdAt:new Date().toISOString()};
          await sb.from("users").upsert(u);break;
        }
        case"TOGGLE_ADMIN":{
          const usr=s.users.find(u=>u.id===action.id);
          if(usr)await sb.from("users").update({role:usr.role==="admin"?"client":"admin"}).eq("id",action.id);
          break;
        }
        case"CREATE_ORDER":{
          const num="PF-"+String(s.nextOrderId).padStart(4,"0");
          const o={id:s.nextOrderId,number:num,clientId:s.currentUser.id,clientName:s.currentUser.name,...action.order,files:[],status:action.order.needsQuote?"Orçamento":"Novo",createdAt:new Date().toISOString(),deliveryLink:"",htmlCode:"",internalNote:"",quote:"",quoteStatus:"",assigneeId:null};
          await sb.from("orders").upsert(o);break;
        }
        case"UPDATE_ORDER":
          await sb.from("orders").update(action.updates).eq("id",action.id);break;
        case"RESPOND_QUOTE":
          await sb.from("orders").update({quoteStatus:action.response}).eq("id",action.id);break;
        case"CREATE_TICKET":{
          const num="TK-"+String(s.nextTicketId).padStart(4,"0");
          const t={id:s.nextTicketId,number:num,clientId:s.currentUser.id,clientName:s.currentUser.name,...action.ticket,status:"Aberto",response:"",createdAt:new Date().toISOString()};
          await sb.from("tickets").upsert(t);break;
        }
        case"RESPOND_TICKET":
          await sb.from("tickets").update({response:action.response,status:"Respondido"}).eq("id",action.id);break;
      }
    }catch(e){console.warn("Supabase sync failed",e);}
  },[]);

  if(loading)return(
    <div style={{minHeight:"100vh",background:"#faf9f6",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:52,height:52,borderRadius:"50%",border:"3px solid #e2e8f0",borderTop:"3px solid #f59e0b",animation:"spin 0.9s linear infinite"}}/>
      <span style={{color:"#94a3b8",fontSize:14,fontWeight:600,letterSpacing:".02em"}}>Carregando PageFlash...</span>
    </div>
  );
  if(!state.currentUser)return<Auth state={state} dispatch={syncDispatch}/>;
  if(state.isAdmin&&!viewAsClient)return<AdminPanel state={state} dispatch={syncDispatch} onViewAsClient={()=>setViewAsClient(true)}/>;
  return<ClientPanel state={state} dispatch={syncDispatch} onBackToAdmin={state.isAdmin?()=>setViewAsClient(false):null}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
